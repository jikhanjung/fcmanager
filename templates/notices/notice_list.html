{% extends "base.html" %}
{% block title %}공지사항 — FC Sky{% endblock %}
{% block content %}
<h1 class="h3 mb-4">공지사항</h1>

<div class="list-group shadow-sm">
  {% for n in notices %}
    <a href="{{ n.get_absolute_url }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <span>
        {% if n.is_pinned %}<span class="badge bg-danger me-1">고정</span>{% endif %}
        {{ n.title }}
      </span>
      <small class="text-muted">{{ n.created_at|date:"Y.m.d" }}</small>
    </a>
  {% empty %}
    <div class="list-group-item text-muted">등록된 공지사항이 없습니다.</div>
  {% endfor %}
</div>
{% endblock %}
