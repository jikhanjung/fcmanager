{% extends "base.html" %}
{% block title %}대회 관리{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">대회 관리</h1>
  <a href="{% url 'competitions:competition_create' %}" class="btn btn-primary btn-sm">+ 새 대회</a>
</div>

<div class="table-responsive">
  <table class="table table-sm align-middle">
    <thead class="table-light">
      <tr><th>연도</th><th>대회</th><th>종류</th><th>부문</th><th>경기</th><th class="text-end">관리</th></tr>
    </thead>
    <tbody>
      {% for c in competitions %}
      <tr>
        <td>{{ c.year }}</td>
        <td><a href="{{ c.get_absolute_url }}" class="text-decoration-none">{{ c.name }}</a></td>
        <td>{{ c.get_kind_display }}</td>
        <td>{{ c.division_count }}</td>
        <td>{{ c.match_count }}</td>
        <td class="text-end text-nowrap">
          <a href="{% url 'competitions:competition_edit' c.slug %}" class="btn btn-outline-secondary btn-sm py-0">수정</a>
          <a href="{% url 'competitions:competition_delete' c.slug %}" class="btn btn-outline-danger btn-sm py-0">삭제</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="6" class="text-center text-muted py-4">대회가 없습니다.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
