{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FC Sky{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'img/fcskylogo.png' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'teams:home' %}">
        <img src="{% static 'img/fcskylogo.png' %}" alt="FC Sky" height="32" class="bg-white rounded p-1">
        FC Sky
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'teams:home' %}">홈</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'teams:list' %}">팀</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'matches:list' %}">일정·결과</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'competitions:standings' %}">순위표</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'matches:scorers' %}">득점 순위</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'competitions:awards' %}">명예의 전당</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/">관리</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted py-4 border-top mt-5">
    <small>FC Sky &copy; {% now "Y" %}</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
