# 운영(dolfinid) 전용 compose.
#   - deploy/sync_to_srv.sh 가 이 파일을 /srv/fcmanager/docker-compose.yml 로 복사한다.
#   - 그 위치(/srv/fcmanager)에서 실행: cd /srv/fcmanager && docker compose up -d
#   - 이미지는 빌드하지 않고 pull. 버전은 .env 의 IMAGE_TAG (deploy.sh 가 갱신).
#   - 개발/로컬 빌드는 별도 파일(deploy/docker-compose.yml, build: 포함)을 쓴다.
services:
  web:
    image: honestjung/fcmanager:${IMAGE_TAG:-latest}
    container_name: fcmanager
    restart: unless-stopped
    # 비밀값(DJANGO_SECRET_KEY 등) + IMAGE_TAG 는 /srv/fcmanager/.env 에서 주입(git 비추적).
    env_file:
      - .env
    ports:
      # 호스트 8000은 portainer가 점유 → 기본 8003. 병렬 운영(레거시 fcsky 와 동시 가동)
      # 시에는 /srv/fcmanager/.env 의 HOST_PORT 로 override(예: 8004).
      - "${HOST_PORT:-8003}:8000"
    environment:
      DJANGO_DEBUG: "false"
      # SaaS: 전용 도메인 루트에서 서비스(플랫폼 / + 클럽 /<slug>/). URL_PREFIX 미사용.
      # 기본값 = 운영(dolfinid). 테스트 호스트(m710q)는 .env 로 override(tailnet 호스트명 등)
      # — compose 가 같은 디렉터리 .env 를 치환에 쓰므로 env_file 과 동일 파일로 동작.
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-fcmanager.app,www.fcmanager.app,localhost,127.0.0.1,0.0.0.0,34.64.158.160}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-https://fcmanager.app,https://www.fcmanager.app}"
      # 관리자 계정은 없을 때만 생성(신규 DB 부트스트랩).
      # 비번은 .env(DJANGO_SUPERUSER_PASSWORD)에서 주입 — 평문 커밋 금지.
      DJANGO_SUPERUSER_USERNAME: "admin"
    volumes:
      # DB·미디어는 호스트 영속 경로(/srv/fcmanager). uid 1000(컨테이너 appuser) 쓰기 가능해야 함.
      - /srv/fcmanager/db.sqlite3:/app/db.sqlite3
      - /srv/fcmanager/media:/app/media
