# 로컬/단일 호스트 실행용. 빌드 컨텍스트는 프로젝트 루트.
#   docker compose -f deploy/docker-compose.yml up --build
services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: honestjung/fcsky:0.1.1
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_SECRET_KEY: "change-me-in-production"
      DJANGO_SEED: "1"
      DJANGO_SUPERUSER_USERNAME: "admin"
      DJANGO_SUPERUSER_PASSWORD: "fcsky1234"
    volumes:
      - fcsky-data:/app/data-vol
      - fcsky-media:/app/media

volumes:
  fcsky-data:
  fcsky-media:
