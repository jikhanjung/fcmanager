# 로컬/단일 호스트 실행용. 빌드 컨텍스트는 프로젝트 루트.
#   docker compose -f deploy/docker-compose.yml up --build
services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        # 정적 파일을 서브패스(/FcSky/)에 맞춰 수집. 아래 environment와 동일해야 함.
        DJANGO_URL_PREFIX: "FcSky"
    image: honestjung/fcsky:0.1.9
    # 운영 SECRET_KEY 등 비밀값은 git 비추적인 deploy/.env 에서 주입(경로는 compose 파일 기준).
    env_file:
      - .env
    ports:
      # 호스트 8000은 portainer가 점유 → 8003으로 노출.
      - "8003:8000"
    environment:
      DJANGO_DEBUG: "false"
      # 사이트를 /FcSky/ 하위에서 서비스(정적/미디어/링크 모두 접두사 반영).
      DJANGO_URL_PREFIX: "FcSky"
      # nginx가 Host: 34.64.158.160 으로 프록시 → 해당 IP를 허용해야 함(DEBUG=false).
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,34.64.158.160"
      # admin 로그인 등 POST의 CSRF 출처 검증(IP 기반 접근).
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://34.64.158.160"
      # 운영 도메인/HTTPS 도입 시 도메인·https 출처를 위 두 값에 추가. 예:
      #   DJANGO_ALLOWED_HOSTS: "fcsky.example.com,localhost,127.0.0.1,0.0.0.0,34.64.158.160"
      #   DJANGO_CSRF_TRUSTED_ORIGINS: "https://fcsky.example.com,http://34.64.158.160"
      # DJANGO_SECRET_KEY 는 위 env_file(deploy/.env)에서 주입 — 여기에 두지 않음(git 비추적).
      # 영속 DB 사용. 기존 데이터 보존을 위해 기본 시드 OFF.
      # 초기 데이터를 새로 깔 때만 일시적으로 1로 실행.
      DJANGO_SEED: "0"
      DJANGO_SUPERUSER_USERNAME: "admin"
      DJANGO_SUPERUSER_PASSWORD: "fcsky1234"
    volumes:
      # DB·미디어는 호스트 영속 경로(/srv/FcSky). uid 1000(컨테이너 appuser) 소유여야 쓰기 가능.
      # 미디어는 nginx가 /FcSky/media/ 로 직접 서빙(아래 디렉터리 alias).
      - /srv/FcSky/db.sqlite3:/app/db.sqlite3
      - /srv/FcSky/media:/app/media
