# 로컬/단일 호스트 실행용. 빌드 컨텍스트는 프로젝트 루트.
#   docker compose -f deploy/docker-compose.yml up --build
services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: honestjung/fcsky:0.6.0
    # 운영 SECRET_KEY 등 비밀값은 git 비추적인 deploy/.env 에서 주입(경로는 compose 파일 기준).
    env_file:
      - .env
    ports:
      # 호스트 8000은 portainer가 점유 → 8003으로 노출.
      - "8003:8000"
    environment:
      DJANGO_DEBUG: "false"
      # SaaS: 전용 도메인(fcmanager.app) 루트에서 서비스. URL_PREFIX 미사용 → 정적/미디어 /static/, /media/.
      DJANGO_ALLOWED_HOSTS: "fcmanager.app,www.fcmanager.app,localhost,127.0.0.1,0.0.0.0,34.64.158.160"
      DJANGO_CSRF_TRUSTED_ORIGINS: "https://fcmanager.app,https://www.fcmanager.app"
      # DJANGO_SECRET_KEY 는 위 env_file(deploy/.env)에서 주입 — 여기에 두지 않음(git 비추적).
      # 비번은 .env(DJANGO_SUPERUSER_PASSWORD)에서 주입 — 평문 커밋 금지.
      DJANGO_SUPERUSER_USERNAME: "admin"
    volumes:
      # DB·미디어는 호스트 영속 경로(/srv/FcSky). uid 1000(컨테이너 appuser) 소유여야 쓰기 가능.
      # 미디어는 nginx가 /FcSky/media/ 로 직접 서빙(아래 디렉터리 alias).
      - /srv/FcSky/db.sqlite3:/app/db.sqlite3
      - /srv/FcSky/media:/app/media
