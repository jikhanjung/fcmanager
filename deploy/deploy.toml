# fcmanager 배포 매니페스트 — 배포·데이터 계약 선언층.
# 프로젝트별 배포 지식을 기억이 아니라 이 파일에 고정한다. 단일 오케스트레이터(또는
# Claude Code)가 프로젝트 지식 없이 이 매니페스트만 읽고 배포·검증할 수 있게 하는 것이 목표.
# 근거: ../devdocs/wiki/deploy-data-contract.md · ../DEPLOY.md · deploy/README.md.

contract_version = 1                       # 이 매니페스트가 따르는 배포·데이터 계약 판(필드·동사 의미 변경 시 증가).
instance = "fcmanager"
image    = "honestjung/fcmanager"          # Docker Hub. build.sh 가 :X.Y.Z + :latest push.
db_path  = "/srv/fcmanager/db/db.sqlite3"  # 호스트 DB 파일 전체 경로(계약 표준 표기, 2026-07-14 3-repo 통일 — 디렉터리는 dirname).
                                           # 마운트는 디렉터리 단위: dirname(/srv/fcmanager/db) → 컨테이너 /app/hostdb —
                                           # WAL 형제(-wal/-shm) 호스트 공유 위해 파일 아닌 디렉터리 마운트(fsis2026 패턴, 0.6.16).
has_seed = false                           # ⚠️ 시스템 시드 레인 없음 — 전 모델이 운영 데이터(운영자 입력).
                                           # seed_* 관리 명령은 레인 위반 냄새(DEPLOY.md 레인 경계) → 은퇴 대상.
services = ["web"]                         # compose 단일 서비스(gunicorn). 워커/사이드카 없음.
rollback_db = "keep"                       # rollback 기본 DB 정책: keep(이미지만 전환·운영 데이터 보존) | restore(스냅샷 복원).
                                           # keep 이 기본 — DB 복원은 배포 후 운영 입력분을 지우므로 명시적 opt-in(계약 §rollback 동사).

# 헬스체크. /healthz = 버전 + DB + 핵심 행 수(club·match). smoke 가 소비, deploy.sh 이 자동 호출.
health_url   = "/healthz"
health_probe = "http://127.0.0.1:8004/healthz"   # HOST_PORT(운영 .env = 8004, 스크립트 기본 8003). X-Forwarded-Proto: https 헤더로 검증.

# 배포 동사(계약 이름 → 현 구현). deploy 는 git-free — 이미지에서 host 파일 추출.
[verbs]
preflight = "deploy/preflight.sh [<since-ref>]"             # 빌드 호스트: 위험 표면 diff + seed 냄새 lint + DEPLOY.md
build     = "deploy/build.sh X.Y.Z"                         # 빌드 호스트: test + bump + build + push
deploy    = "deploy/remote-prod.sh X.Y.Z"                   # 빌드 호스트에서 원격 원터치(= ssh dolfinid '/srv/fcmanager/deploy-prod.sh X.Y.Z').
                                                            # 운영 호스트 직접 실행도 동일: 추출 → 스냅샷 → 스왑 → migrate(entrypoint) → DB게이트 → smoke
                                                            # 테스트(m710q 로컬): /srv/fcmanager/deploy-dev.sh X.Y.Z (스냅샷 없음)
seed      = "(없음 — has_seed=false, 운영 데이터는 in-app 입력만)"
smoke     = "/srv/fcmanager/smoke.sh [X.Y.Z]"               # 대상 호스트: healthz 200 + 버전 일치 + club>0
rollback  = "/srv/fcmanager/rollback.sh <이전 X.Y.Z> [--db=keep|restore]"  # 코드/DB 분리: keep(기본, 이미지만)·restore(스냅샷 복원). keep 가드=직전 migration 시 차단
bootstrap = "deploy/sync_to_srv.sh"                         # repo 머신 1회: 호스트 래퍼 설치(이후 self-heal)

# --- 환경 ---
# 빌드 호스트(m710q)가 이미지를 push, 운영 호스트(dolfinid)가 소비. prod 단일 호스트.
[targets.prod]
host     = "dolfinid"                      # GCP. m710q→dolfinid SSH 키 인증(무-passphrase) — 원격 원터치 배포 가능.
domain   = "fcmanager.app"                 # 앞단 nginx + HTTPS(리다이렉트는 nginx 담당, Django SECURE_SSL_REDIRECT 미사용).
entry    = "/srv/fcmanager/deploy-prod.sh" # DEPLOY_SNAPSHOT=1 — 스왑 직전 원자적 DB 스냅샷(retention 20, 3-repo 공통).
snapshot = true
expose   = "0.0.0.0:8004"                  # .env HOST_PORT=8004 (8000 portainer·8003 은 과거 병렬 운영 잔재). nginx 경유 서빙.
data_dir = "/srv/fcmanager"                # DB, media, .env, backup(hourly + pre_deploy), scripts/backup_db.py
# 원격 원터치: ./deploy/remote-prod.sh X.Y.Z (= ssh dolfinid '/srv/fcmanager/deploy-prod.sh X.Y.Z')

[targets.test]
host     = "m710q"                         # 빌드 호스트가 곧 테스트 서버(cdGTS test target 과 동형).
domain   = "0.0.0.0:8005"                  # .env HOST_PORT=8005 (8003 은 m710q 에서 fsis 점유). LAN 접근 가능.
entry    = "/srv/fcmanager/deploy-dev.sh"  # DEPLOY_SNAPSHOT=0 — DB = dev_data(운영 백업 미러) 복사본, 폐기 가능.
snapshot = false
data_dir = "/srv/fcmanager"                # 테스트 호스트도 동일 레이아웃(스크립트 ROOT·compose 볼륨 하드코딩과 일치).
